<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Teola - Your AI Fashion Stylist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --maison-accent: #3b82f6;
      --vh: 1vh;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #fafafa;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
      height: 100dvh;
      height: calc(var(--vh, 1vh) * 100);
      width: 100%;
      position: fixed;
      overflow: hidden;
    }
    .dark body {
      background-color: #050505;
      color: #f5f5f5;
    }
    .serif {
      font-family: 'Playfair Display', serif;
    }
    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .dark .glass {
      background: rgba(10, 10, 10, 0.75);
    }
    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
    *:focus-visible {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    @keyframes scan {
      0% { top: -10%; opacity: 0; }
      50% { opacity: 1; }
      100% { top: 110%; opacity: 0; }
    }
    .animate-scan {
      animation: scan 3s linear infinite;
    }
    button:active {
      transform: scale(0.96);
    }
    .a11y-mode {
      --font-size-base: 20px;
    }
    .a11y-mode .serif {
      font-weight: 900;
    }
    .nav-dot {
      transition: all 400ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .perspective-1000 {
      perspective: 1000px;
    }
    .preserve-3d {
      transform-style: preserve-3d;
    }
  </style>
  <script>
    const setVh = () => {
      let vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    };
    window.addEventListener('resize', setVh);
    window.addEventListener('orientationchange', setVh);
    setVh();
  </script>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",

    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.45.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="transition-colors duration-500">
  <div id="root" class="h-full w-full"></div>

<script type="module" src="/index.tsx"></script>
</body>
</html>
